apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todolist-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Peaksis1/Kubernetes-Helm-AgroCD-Devops.git
    targetRevision: main
    path: todolist

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true